<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salva nuestro amor mi ojitos de uva 🍇❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div id="ui-layer">
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="score-board">Nivel 1 | Puntos: <span id="score">0</span></div>
        </div>

        <div id="screen-overlay">
            <h1 id="overlay-title">Salva nuestro amor mi ojitos de uva 🍇❤️</h1>
            <p id="overlay-desc">Mueve el escudo con tu mouse o dedo para apartar los obstáculos y proteger al globo.</p>
            <button id="start-btn">Jugar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
